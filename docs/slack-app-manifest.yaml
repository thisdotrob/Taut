display_information:
  name: Taut
  description: Lightweight review-first Slack triage feed for Rob.
  background_color: "#17130f"
oauth_config:
  redirect_urls:
    # Slack requires HTTPS for OAuth redirects. Replace this placeholder with
    # your HTTPS tunnel or deployed backend callback URL, and set
    # SLACK_REDIRECT_URI to exactly the same value.
    - https://taut.example.com/api/slack/oauth/callback
  scopes:
    user:
      - channels:read
      - groups:read
      - im:read
      - mpim:read
      - channels:history
      - groups:history
      - im:history
      - mpim:history
      - chat:write
      - reactions:write
      - users:read
settings:
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
